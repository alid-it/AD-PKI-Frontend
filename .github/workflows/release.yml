name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Package
        run: |
          tar -czf ad-pki-frontend.tar.gz -C dist .
          sha256sum ad-pki-frontend.tar.gz > SHA256SUMS

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ad-pki-frontend.tar.gz
            SHA256SUMS